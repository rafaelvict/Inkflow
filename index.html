<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP is set in main process via session.webRequest.onHeadersReceived -->
  <title>Inkflow</title>
  <style>
    /* Splash screen — renders instantly before React/JS loads */
    body {
      margin: 0;
      background: #202020;
      overflow: hidden;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #202020;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #e4e4e4;
      transition: opacity 0.4s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-cup {
      font-size: 48px;
      animation: splash-spin 2s ease-in-out infinite;
      margin-bottom: 24px;
    }
    @keyframes splash-spin {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(15deg) scale(1.05); }
      50%  { transform: rotate(0deg) scale(1); }
      75%  { transform: rotate(-15deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .splash-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: #e4e4e4;
    }
    .splash-msg {
      font-size: 13px;
      color: #9a9a9a;
      min-height: 20px;
      transition: opacity 0.3s ease;
    }
    .splash-dots {
      display: inline-flex;
      gap: 4px;
      margin-left: 4px;
    }
    .splash-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #9a9a9a;
      animation: splash-blink 1.4s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes splash-blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
  <script>
    // --- Asset path for Excalidraw font loading ---
    //
    // ExcalidrawFontFace.ts:197 normalizeBaseUrl() does:
    //   if (/^\.?\//.test(path)) → new URL(path, window.location.origin)
    //
    // In Electron prod (file://), window.location.origin === "null" (string literal).
    // This breaks: new URL("", "null") → TypeError.
    //
    // Fix: in file://, compute absolute URL from location.href.
    // An absolute file:// URL does NOT match /^\.?\//, so it bypasses
    // the problematic branch in normalizeBaseUrl.
    //
    if (window.location.protocol === "file:") {
      window.EXCALIDRAW_ASSET_PATH = new URL("./", window.location.href).href;
    } else {
      // Dev: Vite dev server (http://localhost:5173)
      window.EXCALIDRAW_ASSET_PATH = "/";
    }
    window.EXCALIDRAW_EXPORT_SOURCE = "Inkflow";
  </script>
</head>
<body>
  <!-- Splash screen — visible until React mounts -->
  <div id="splash">
    <div class="splash-cup">☕</div>
    <div class="splash-title">Inkflow</div>
    <div class="splash-msg">
      <span id="splash-text">Preparando seu workspace</span>
      <span class="splash-dots"><span></span><span></span><span></span></span>
    </div>
  </div>
  <script>
    // Rotate splash messages while loading
    (function() {
      var msgs = [
        "Preparando seu workspace",
        "Carregando componentes",
        "Aquecendo o cafe",
        "Ajustando o canvas",
        "Quase pronto"
      ];
      var i = 0;
      var el = document.getElementById("splash-text");
      setInterval(function() {
        i = (i + 1) % msgs.length;
        if (el) el.textContent = msgs[i];
      }, 1800);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="./src/renderer/index.tsx"></script>
</body>
</html>
