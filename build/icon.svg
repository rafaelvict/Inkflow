<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square, dark navy/purple gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" />

  <!-- Paper/document shape (text side) -->
  <rect x="88" y="96" width="200" height="264" rx="12" ry="12"
        fill="#0f172a" stroke="#334155" stroke-width="3" />

  <!-- Text lines on paper -->
  <rect x="108" y="132" width="140" height="10" rx="5" fill="url(#lineGrad)" opacity="0.9"/>
  <rect x="108" y="158" width="160" height="8" rx="4" fill="#475569" opacity="0.8"/>
  <rect x="108" y="180" width="120" height="8" rx="4" fill="#475569" opacity="0.7"/>
  <rect x="108" y="202" width="150" height="8" rx="4" fill="#475569" opacity="0.6"/>
  <rect x="108" y="224" width="100" height="8" rx="4" fill="#475569" opacity="0.5"/>

  <!-- Checkbox items -->
  <rect x="108" y="252" width="14" height="14" rx="3" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <polyline points="110,259 113,263 120,256" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="108" y="276" width="14" height="14" rx="3" fill="none" stroke="#475569" stroke-width="2.5"/>
  <rect x="108" y="300" width="14" height="14" rx="3" fill="none" stroke="#475569" stroke-width="2.5"/>
  <rect x="130" y="254" width="80" height="8" rx="4" fill="#475569" opacity="0.6"/>
  <rect x="130" y="278" width="100" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="130" y="302" width="70" height="8" rx="4" fill="#475569" opacity="0.4"/>

  <!-- Canvas/diagram area (right side, slightly overlapping) -->
  <rect x="224" y="152" width="200" height="200" rx="12" ry="12"
        fill="#0f172a" stroke="#334155" stroke-width="3" />

  <!-- Simple diagram inside canvas: boxes and connector -->
  <rect x="244" y="172" width="60" height="36" rx="6" fill="url(#pencilGrad)" opacity="0.8"/>
  <rect x="344" y="172" width="60" height="36" rx="6" fill="#334155" stroke="#a78bfa" stroke-width="2"/>
  <!-- Arrow line -->
  <line x1="304" y1="190" x2="344" y2="190" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="340,186 348,190 340,194" fill="#a78bfa"/>

  <!-- Squiggly line / freehand element -->
  <path d="M244 240 Q264 228 284 240 Q304 252 324 240 Q344 228 364 240 Q384 252 404 240"
        fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Small circle node -->
  <circle cx="274" cy="300" r="16" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="344" cy="300" r="16" fill="none" stroke="#475569" stroke-width="2.5"/>
  <line x1="290" y1="300" x2="328" y2="300" stroke="#475569" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Pencil icon (bottom right, accent) -->
  <g transform="translate(344, 344) rotate(-40)">
    <!-- Pencil body -->
    <rect x="-10" y="-52" width="20" height="70" rx="3" fill="url(#pencilGrad)"/>
    <!-- Pencil tip -->
    <polygon points="-10,18 10,18 0,36" fill="#fbbf24"/>
    <!-- Pencil eraser -->
    <rect x="-10" y="-62" width="20" height="12" rx="3" fill="#f87171"/>
    <!-- Pencil line detail -->
    <line x1="-4" y1="-52" x2="-4" y2="18" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
